name: Apply Quick Links Fix

on:
  push:
    branches:
      - fix/site-analyzer-quick-links

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/site-analyzer-quick-links
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Restyle state AADT quick links
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/siteAnalyzerPresentation.js')
          text = path.read_text()
          old = '.fiq-intro .aadt-tabs{margin:27px 0 0;display:flex;align-items:center;gap:9px;flex-wrap:wrap}.fiq-intro .aadt-tabs .muted{color:#87a1b5;font-size:13px}.fiq-intro .aadt-tab{display:inline-flex;align-items:center;justify-content:center;min-width:48px;padding:10px 14px;border:1px solid rgba(255,255,255,.18);border-radius:999px;background:rgba(255,255,255,.07);color:#fff;text-decoration:none;font-size:13px;font-weight:850}.fiq-intro .aadt-tab:hover{background:rgba(255,255,255,.14)}'
          new = '.fiq-intro .aadt-tabs{width:fit-content;max-width:100%;margin:28px 0 0;padding:10px 12px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;border:1px solid rgba(255,255,255,.13);border-radius:14px;background:rgba(4,19,31,.58);box-shadow:0 12px 30px rgba(0,0,0,.14);backdrop-filter:blur(10px)}.fiq-intro .aadt-tabs .muted{padding:0 8px 0 2px;color:#b7cad8;font-size:11px;font-weight:850;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}.fiq-intro .aadt-tab{display:inline-flex;align-items:center;justify-content:center;min-width:43px;height:38px;padding:0 12px;border:1px solid rgba(255,255,255,.16);border-radius:9px;background:rgba(255,255,255,.08);color:#f7fbff;text-decoration:none;font-size:12px;font-weight:900;box-shadow:none;transition:transform .15s,background .15s,border-color .15s}.fiq-intro .aadt-tab:hover{transform:translateY(-1px);border-color:rgba(244,185,66,.7);background:rgba(244,185,66,.16);color:#fff}.fiq-intro .aadt-tab:focus-visible{outline:3px solid rgba(244,185,66,.35);outline-offset:2px}'
          if old in text:
              path.write_text(text.replace(old, new))
          elif new not in text:
              raise SystemExit('Expected quick-link CSS was not found')
          PY
          node --check src/siteAnalyzerPresentation.js
          npm run check
      - name: Commit style correction
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/siteAnalyzerPresentation.js
          git commit -m "Restyle state AADT quick links"
          git push origin HEAD:fix/site-analyzer-quick-links
