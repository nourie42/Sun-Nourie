name: Validate Fuel Atlas

on:
  pull_request:
    branches:
      - main
    paths:
      - "public/fuel-atlas.html"
      - "public/fuel-atlas.js"
      - "src/fuelAtlasRoutes.js"
      - "src/fuelAtlasLocationCompanyBridge.js"
      - "scripts/validateFuelAtlas.js"
      - "scripts/testFuelAtlasRoutes.js"
      - "scripts/testFuelAtlasCompanyLookup.js"
      - "scripts/testFuelAtlasLocationCompanyBridge.js"
      - "scripts/testFuelAtlasSourceIntegration.js"
      - "scripts/smokeFuelAtlasLive.js"
      - ".github/workflows/validate-fuel-atlas.yml"
  push:
    branches:
      - main
      - "fix/fuel-atlas-*"
    paths:
      - "public/fuel-atlas.html"
      - "public/fuel-atlas.js"
      - "src/fuelAtlasRoutes.js"
      - "src/fuelAtlasLocationCompanyBridge.js"
      - "scripts/validateFuelAtlas.js"
      - "scripts/testFuelAtlasRoutes.js"
      - "scripts/testFuelAtlasCompanyLookup.js"
      - "scripts/testFuelAtlasLocationCompanyBridge.js"
      - "scripts/testFuelAtlasSourceIntegration.js"
      - "scripts/smokeFuelAtlasLive.js"
      - ".github/workflows/validate-fuel-atlas.yml"

jobs:
  validate-atlas:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check Fuel Atlas syntax
        run: |
          node --check src/fuelAtlasRoutes.js
          node --check src/fuelAtlasLocationCompanyBridge.js
          node --check public/fuel-atlas.js
          node --check scripts/testFuelAtlasCompanyLookup.js
          node --check scripts/testFuelAtlasLocationCompanyBridge.js
          node --check scripts/smokeFuelAtlasLive.js
          node --check scripts/testFuelAtlasSourceIntegration.js
      - name: Validate Fuel Atlas structure
        run: node scripts/validateFuelAtlas.js
      - name: Validate Fuel Atlas route behavior
        run: node scripts/testFuelAtlasRoutes.js
      - name: Validate nationwide company-name lookup
        run: node scripts/testFuelAtlasCompanyLookup.js
      - name: Validate city-to-company lookup
        run: node scripts/testFuelAtlasLocationCompanyBridge.js
      - name: Query live EPA distributor data
        run: node scripts/testFuelAtlasSourceIntegration.js
