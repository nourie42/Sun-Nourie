name: Site Analyzer Address Browser Smoke

on:
  pull_request:
    branches:
      - main

jobs:
  address-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install application and browser
        run: |
          npm install --no-audit --no-fund
          npm install --no-save --no-audit --no-fund puppeteer@24

      - name: Start Fuel IQ locally
        shell: bash
        run: |
          PORT=3210 NODE_ENV=test node server.js > /tmp/fuel-iq-server.log 2>&1 &
          echo $! > /tmp/fuel-iq-server.pid
          for attempt in $(seq 1 80); do
            if curl -fsS --max-time 2 http://127.0.0.1:3210/health >/tmp/health.json 2>/dev/null; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 0.5
          done
          cat /tmp/fuel-iq-server.log
          exit 1

      - name: Verify address typing and visible suggestions
        shell: bash
        run: |
          cat > address-smoke.mjs <<'EOF'
          import puppeteer from 'puppeteer';

          const browser = await puppeteer.launch({ headless: true, args: ['--no-sandbox', '--disable-setuid-sandbox'] });
          const page = await browser.newPage();
          await page.setViewport({ width: 800, height: 600 });
          page.setDefaultTimeout(60000);
          const pageErrors = [];
          page.on('pageerror', (error) => pageErrors.push(error.stack || String(error)));
          await page.setRequestInterception(true);
          page.on('request', (request) => {
            const url = request.url();
            const parsed = new URL(url);
            const autocompleteInput = parsed.searchParams.get('input') || parsed.searchParams.get('q') || '';
            const isButtermilk = /3201\s+Buttermilk/i.test(autocompleteInput);

            if (url.includes('/google/autocomplete?')) {
              request.respond({
                status: 200,
                contentType: 'application/json',
                body: JSON.stringify(isButtermilk
                  ? { ok: true, status: 'ZERO_RESULTS', items: [] }
                  : { ok: true, status: 'OK', items: [
                      { type: 'Google', display: '915 Early Boulevard, Early, TX 76802, USA', place_id: 'test-place' },
                    ] }),
              });
              return;
            }
            if (url.includes('/osm/autocomplete?')) {
              request.respond({
                status: 200,
                contentType: 'application/json',
                body: JSON.stringify(isButtermilk
                  ? { ok: true, status: 'ZERO_RESULTS', items: [] }
                  : { ok: true, status: 'OK', items: [
                      { type: 'OSM', display: '915 Early Boulevard, Early, Texas 76802', lat: 31.742, lon: -98.945 },
                    ] }),
              });
              return;
            }
            if (url.includes('/google/findplace?')) {
              request.respond({
                status: 200,
                contentType: 'application/json',
                body: JSON.stringify(isButtermilk
                  ? {
                      ok: true,
                      status: 'OK',
                      place_id: 'buttermilk-place',
                      address: '3201 Buttermilk Rd, Cottondale, AL 35453, USA',
                      location: { lat: 33.176, lng: -87.445 },
                    }
                  : { ok: false, status: 'ZERO_RESULTS' }),
              });
              return;
            }
            if (url.includes('geocoding.geo.census.gov/geocoder/locations')) {
              request.respond({
                status: 200,
                contentType: 'application/json',
                body: JSON.stringify({ result: { addressMatches: [] } }),
              });
              return;
            }
            if (url.includes('nominatim.openstreetmap.org/search')) {
              request.respond({ status: 200, contentType: 'application/json', body: '[]' });
              return;
            }
            request.continue();
          });

          try {
            const response = await page.goto('http://127.0.0.1:3210/?smoke=autocomplete', { waitUntil: 'domcontentloaded', timeout: 90000 });
            if (!response?.ok()) throw new Error(`Home page returned ${response?.status()}`);
            await page.waitForSelector('#addr');
            await page.waitForSelector('script[data-fiq-address-provider-fallback]', { timeout: 15000 });
            await page.waitForSelector('script[data-fiq-autocomplete-recovery]', { timeout: 15000 });
            await new Promise((resolve) => setTimeout(resolve, 1000));

            const before = await page.evaluate(() => {
              const input = document.getElementById('addr');
              const rect = input.getBoundingClientRect();
              const top = document.elementFromPoint(rect.left + 12, rect.top + 12);
              return {
                disabled: input.disabled,
                readOnly: input.readOnly,
                pointerEvents: getComputedStyle(input).pointerEvents,
                topId: top?.id || null,
                topTag: top?.tagName || null,
                apiText: document.getElementById('apiStatus')?.textContent || '',
              };
            });

            if (before.disabled || before.readOnly) throw new Error('Address field is disabled or read-only.');
            if (before.pointerEvents === 'none') throw new Error('Address field does not accept pointer input.');
            if (before.topId !== 'addr') throw new Error(`Address field is covered by ${before.topTag || 'unknown'}#${before.topId || ''}.`);

            await page.click('#addr');
            await page.type('#addr', '915 Early Boulevard', { delay: 15 });
            await page.waitForFunction(() => {
              const box = document.getElementById('fiqAutocompleteRecovery');
              return box && !box.hidden && box.querySelectorAll('.fiq-ac-option').length >= 1;
            }, { timeout: 15000 });

            const state = await page.evaluate(() => {
              const box = document.getElementById('fiqAutocompleteRecovery');
              return {
                value: document.getElementById('addr')?.value || '',
                hidden: box?.hidden,
                count: box?.querySelectorAll('.fiq-ac-option').length || 0,
                text: box?.textContent?.trim() || '',
                status: document.getElementById('apiStatus')?.textContent || '',
              };
            });
            console.log('autocomplete_state', state);
            if (!state.value.includes('915 Early Boulevard')) throw new Error(`Typing did not reach the address field: ${state.value}`);
            if (state.hidden || state.count < 1) throw new Error('Autocomplete suggestions were not visibly rendered.');
            if (!state.text.includes('915 Early Boulevard')) throw new Error(`Expected address was not present: ${state.text}`);

            await page.click('#fiqAutocompleteRecovery .fiq-ac-option');
            const selected = await page.$eval('#addr', (element) => element.value);
            if (!selected.includes('915 Early Boulevard')) throw new Error(`Suggestion selection failed: ${selected}`);

            await page.click('#addr');
            await page.evaluate(() => {
              const input = document.getElementById('addr');
              input.value = '';
              input.dispatchEvent(new Event('input', { bubbles: true }));
            });
            await page.type('#addr', '3201 Buttermilk Rd, Cottondale, AL 35453', { delay: 8 });
            await page.waitForFunction(() => {
              const box = document.getElementById('fiqAutocompleteRecovery');
              return box && !box.hidden && /3201 Buttermilk/i.test(box.textContent || '');
            }, { timeout: 20000 });

            const ruralState = await page.evaluate(() => {
              const box = document.getElementById('fiqAutocompleteRecovery');
              return {
                value: document.getElementById('addr')?.value || '',
                hidden: box?.hidden,
                count: box?.querySelectorAll('.fiq-ac-option').length || 0,
                text: box?.textContent?.trim() || '',
              };
            });
            console.log('rural_autocomplete_state', ruralState);
            if (ruralState.hidden || ruralState.count < 1) throw new Error('Exact rural address fallback did not render a suggestion.');
            if (!/3201 Buttermilk/i.test(ruralState.text)) throw new Error(`Rural address was not present: ${ruralState.text}`);

            await page.click('#fiqAutocompleteRecovery .fiq-ac-option');
            await page.waitForFunction(() => Number.isFinite(window.__fiqSelectedAddress?.lat) && Number.isFinite(window.__fiqSelectedAddress?.lon));
            const ruralSelected = await page.evaluate(() => ({
              value: document.getElementById('addr')?.value || '',
              selected: window.__fiqSelectedAddress || null,
            }));
            if (!/3201 Buttermilk/i.test(ruralSelected.value)) throw new Error(`Rural suggestion selection failed: ${ruralSelected.value}`);
            if (!Number.isFinite(ruralSelected.selected?.lat) || !Number.isFinite(ruralSelected.selected?.lon)) throw new Error('Rural address did not publish coordinates.');
            if (pageErrors.length) throw new Error(`Page JavaScript errors: ${pageErrors.join(' | ')}`);
          } finally {
            await browser.close();
          }
          EOF
          node address-smoke.mjs

      - name: Show server log on failure
        if: failure()
        run: cat /tmp/fuel-iq-server.log || true

      - name: Stop local server
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/fuel-iq-server.pid ]; then
            kill "$(cat /tmp/fuel-iq-server.pid)" 2>/dev/null || true
          fi
