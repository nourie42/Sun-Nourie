name: Fuel Atlas Live Smoke

on:
  push:
    branches:
      - main
    paths:
      - "server.js"
      - "public/fuel-atlas.html"
      - "public/fuel-atlas.js"
      - "src/fuelAtlasRoutes.js"
      - "src/fuelAtlasLocationCompanyBridge.js"
      - "scripts/testFuelAtlasLocationCompanyBridge.js"
      - "scripts/smokeFuelAtlasLive.js"
      - "scripts/smokeFuelAtlasCaryLive.js"
      - ".github/workflows/fuel-atlas-live-smoke.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Wait for Render and verify Cary city search
        env:
          FUEL_ATLAS_LIVE_URL: https://sun-nourie-live.onrender.com
        run: node scripts/smokeFuelAtlasCaryLive.js
      - name: Test live regional Fuel Atlas searches
        env:
          FUEL_ATLAS_LIVE_URL: https://sun-nourie-live.onrender.com
        run: node scripts/smokeFuelAtlasLive.js
      - name: Publish live verification result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/fuel-atlas-live-status.json docs/fuel-atlas-cary-live-status.json
          git commit -m "Record successful Fuel Atlas live verification"
          git pull --rebase origin main
          git push origin HEAD:main
