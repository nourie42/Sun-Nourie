name: Apply Exhaustive Runtime Fix

on:
  push:
    branches:
      - fix/exhaustive-runtime-flow

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/exhaustive-runtime-flow
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Wire runtime script and validation
        run: |
          python - <<'PY'
          from pathlib import Path

          server = Path('server.js')
          text = server.read_text()
          marker = "  '<script src=\"/site-research-layout.js\" defer></script>',"
          addition = marker + "\n  '<script src=\"/site-research-runtime-fix.js\" defer></script>',"
          if '/site-research-runtime-fix.js' not in text:
              text = text.replace(marker, addition)
          server.write_text(text)

          package = Path('package.json')
          text = package.read_text()
          marker = 'node --check public/site-research-layout.js'
          replacement = marker + ' && node --check public/site-research-runtime-fix.js'
          if 'node --check public/site-research-runtime-fix.js' not in text:
              text = text.replace(marker, replacement)
          package.write_text(text)

          validation = Path('scripts/validateSiteAnalyzerLayout.js')
          text = validation.read_text()
          if 'site-research-runtime-fix.js' not in text:
              text = text.replace('const wordFix = read("src/siteWordLayoutFix.js");', 'const wordFix = read("src/siteWordLayoutFix.js");\nconst runtimeFix = read("public/site-research-runtime-fix.js");')
              text = text.replace('console.log("Site Analyzer V2 workflow validation passed.");', '''for (const snippet of [
  'Quick Estimate',
  'showRadar(',
  'syncCompletedReport(data)',
  'siteResearchWordButton',
  'siteResearchResultsCard',
  'window.fetch = async',
]) assert(runtimeFix.includes(snippet), `Exhaustive runtime fix is missing: ${snippet}`);
assert(server.includes('/site-research-runtime-fix.js'), 'Server must inject the exhaustive runtime fix.');

console.log("Site Analyzer V2 workflow validation passed.");''')
          validation.write_text(text)
          PY
          npm install --no-audit --no-fund
          npm run check
      - name: Commit generated wiring
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.js package.json scripts/validateSiteAnalyzerLayout.js
          if git diff --cached --quiet; then
            echo "No wiring changes needed"
          else
            git commit -m "Wire explicit exhaustive research runtime flow"
            git push origin HEAD:fix/exhaustive-runtime-flow
          fi
